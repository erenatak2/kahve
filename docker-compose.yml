version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: satis_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: satis_yonetim
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  # Optional: Admin panel for database
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: satis_pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@satis.com
      PGADMIN_DEFAULT_PASSWORD: admin123
    ports:
      - "5050:80"
    depends_on:
      - postgres
    restart: unless-stopped

volumes:
  postgres_data:
